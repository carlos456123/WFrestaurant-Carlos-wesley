<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Cardápio</h1>
      <small>Escolha seus pratos favoritos</small>
    </div>
  </div>

  <div class="content">
    <div class="row">

      <!-- LISTA DE PRATOS -->
      <div class="col-lg-8">
        <div id="lista" class="row g-3"></div>
      </div>

      <!-- PEDIDO ATUAL -->
      <div class="col-lg-4">
        <div class="box-pedido">
          <h5 class="mb-3">🧾 Pedido Atual</h5>
          <div id="pedido-lista">
            <p class="text-muted" style="font-size:13px">Nenhum item adicionado.</p>
          </div>
          <hr>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <strong>Total</strong>
            <strong id="total" style="color:var(--vermelho); font-size:18px">R$ 0,00</strong>
          </div>
          <button
            class="btn btn-vermelho w-100"
            id="btn-finalizar"
            data-bs-toggle="modal"
            data-bs-target="#modal-pedido"
            disabled
          >
            Finalizar Pedido
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL: dados do cliente -->
<div class="modal fade" id="modal-pedido" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Identificação do Cliente</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nome *</label>
          <input id="cli-nome" class="form-control" placeholder="Ex: João Silva"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Telefone *</label>
          <input id="cli-telefone" class="form-control" placeholder="(11) 99999-9999"/>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-vermelho btn-sm" id="btn-confirmar">Confirmar Pedido</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/cardapio.js"></script>
<script>
  $("#sidebar-container").html(renderSidebar(""));
  navAtivo("inicio");
</script>
</body>
</html>
