<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    :root { --vermelho: #8b0000; --vermelho-hover: #6a0000; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f8f7f4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 32px 16px;
    }

    .form-card {
      width: 100%;
      max-width: 440px;
      background: white;
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo span { font-size: 36px; }

    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--vermelho);
      margin-top: 6px;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .subtitulo {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 6px;
    }

    .form-control {
      border-radius: 8px !important;
      border-color: #e0ddd8 !important;
      padding: 10px 14px;
      font-size: 14px;
    }

    .form-control:focus {
      border-color: var(--vermelho) !important;
      box-shadow: 0 0 0 3px rgba(139,0,0,0.1) !important;
    }

    .hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }

    /* Indicador de força da senha */
    .forca-senha {
      height: 4px;
      border-radius: 2px;
      margin-top: 8px;
      transition: all 0.3s;
      background: #e0ddd8;
    }
    .forca-fraca   { background: #ef4444; width: 33%; }
    .forca-media   { background: #f97316; width: 66%; }
    .forca-forte   { background: #22c55e; width: 100%; }

    .btn-cadastrar {
      background: var(--vermelho);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 6px;
    }
    .btn-cadastrar:hover { background: var(--vermelho-hover); }
    .btn-cadastrar:disabled { opacity: 0.6; cursor: not-allowed; }

    .voltar {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #888;
      text-decoration: none;
    }
    .voltar:hover { color: var(--vermelho); }
    .voltar strong { color: var(--vermelho); }

    #erro, #sucesso { border-radius: 8px; font-size: 13px; }
  </style>
</head>
<body>

<div class="form-card">

  <div class="logo">
    <span>🍽️</span>
    <h1>WF Restaurant</h1>
    <p>Crie sua conta para acessar o sistema</p>
  </div>

  <h2>Criar conta</h2>
  <p class="subtitulo">Preencha os dados abaixo para se cadastrar</p>

  <!-- Mensagens -->
  <div id="erro"    class="alert alert-danger  d-none mb-3"></div>
  <div id="sucesso" class="alert alert-success d-none mb-3"></div>

  <div class="mb-3">
    <label class="form-label">Nome completo</label>
    <input id="nome" type="text" class="form-control" placeholder="Ex: João Silva"/>
  </div>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input id="email" type="email" class="form-control" placeholder="seuemail@exemplo.com"/>
  </div>

  <div class="mb-3">
    <label class="form-label">Senha</label>
    <input id="senha" type="password" class="form-control" placeholder="Mínimo 6 caracteres"/>
    <div class="forca-senha" id="forca-barra"></div>
    <div class="hint" id="forca-texto"></div>
  </div>

  <div class="mb-4">
    <label class="form-label">Confirmar senha</label>
    <input id="confirmar" type="password" class="form-control" placeholder="Digite a senha novamente"/>
    <div class="hint" id="hint-confirmar"></div>
  </div>

  <button class="btn-cadastrar" id="btn-cadastrar" onclick="cadastrar()">
    Criar minha conta
  </button>

  <a href="login.html" class="voltar">
    Já tem conta? <strong>Fazer login</strong>
  </a>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils.js"></script>
<script>
  // Já logado → vai direto
  if (localStorage.getItem("token")) {
    window.location.href = "index.html";
  }

  // Indicador de força da senha
  $("#senha").on("input", function() {
    const v = $(this).val();
    const barra = $("#forca-barra");
    const texto = $("#forca-texto");

    if (!v) {
      barra.attr("class", "forca-senha");
      texto.text("");
      return;
    }

    const temLetra  = /[a-zA-Z]/.test(v);
    const temNumero = /[0-9]/.test(v);
    const temEspecial = /[^a-zA-Z0-9]/.test(v);
    const comprimento = v.length >= 8;

    const pontos = [temLetra, temNumero, temEspecial, comprimento].filter(Boolean).length;

    if (pontos <= 1) {
      barra.attr("class", "forca-senha forca-fraca");
      texto.text("Senha fraca");
    } else if (pontos <= 3) {
      barra.attr("class", "forca-senha forca-media");
      texto.text("Senha média");
    } else {
      barra.attr("class", "forca-senha forca-forte");
      texto.text("Senha forte ✓");
    }
  });

  // Validação em tempo real da confirmação
  $("#confirmar").on("input", function() {
    const senha     = $("#senha").val();
    const confirmar = $(this).val();
    const hint      = $("#hint-confirmar");

    if (!confirmar) { hint.text(""); return; }

    if (senha === confirmar) {
      hint.text("Senhas coincidem ✓").css("color", "#22c55e");
      $(this).css("border-color", "#22c55e");
    } else {
      hint.text("Senhas não coincidem").css("color", "#ef4444");
      $(this).css("border-color", "#ef4444");
    }
  });

  function cadastrar() {
    const nome      = $("#nome").val().trim();
    const email     = $("#email").val().trim();
    const senha     = $("#senha").val();
    const confirmar = $("#confirmar").val();

    $("#erro").addClass("d-none");

    // Validações
    if (!nome || !email || !senha || !confirmar) {
      $("#erro").removeClass("d-none").text("Preencha todos os campos.");
      return;
    }

    if (senha.length < 6) {
      $("#erro").removeClass("d-none").text("A senha deve ter pelo menos 6 caracteres.");
      return;
    }

    if (senha !== confirmar) {
      $("#erro").removeClass("d-none").text("As senhas não coincidem.");
      return;
    }

    const btn = $("#btn-cadastrar");
    btn.prop("disabled", true).text("Criando conta...");

    $.ajax({
      url: `${API}/usuarios`,
      method: "POST",
      contentType: "application/json",
      data: JSON.stringify({ nome, email, senha }),
      success() {
        // Redireciona para login com mensagem de sucesso
        window.location.href = "login.html?cadastro=ok";
      },
      error(xhr) {
        const msg = xhr.responseJSON?.detail || "Erro ao criar conta. Tente novamente.";
        $("#erro").removeClass("d-none").text(msg);
        btn.prop("disabled", false).text("Criar minha conta");
      }
    });
  }

  // Cadastrar com Enter
  $("#confirmar").on("keypress", function(e) {
    if (e.which === 13) cadastrar();
  });
</script>
</body>
</html>
