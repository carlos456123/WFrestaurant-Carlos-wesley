<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cardápio — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-title">🍽️ WF Restaurant</div>
  <a href="index.html" data-p="pedidos">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
    Pedidos
  </a>
  <a href="cardapio.html" data-p="cardapio">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
    Cardápio
  </a>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Cardápio</h1>
      <small>Gerenciar produtos</small>
    </div>
    <a href="criar-produto.html" class="btn btn-primary btn-sm">+ Novo Produto</a>
  </div>

  <div class="content">
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Descrição</th>
              <th>Preço</th>
              <th>Disponível</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal delete -->
<div class="modal fade" id="modal-del" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Excluir produto?</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" style="color:var(--muted)">O produto será removido do cardápio.</div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger btn-sm" id="btn-del">Excluir</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script>
  navAtivo("cardapio");
  let delId = null;
  const modal = new bootstrap.Modal(document.getElementById("modal-del"));

  function carregar() {
    $("#tbody").html('<tr><td colspan="6" class="text-center py-4" style="color:var(--muted)">Carregando...</td></tr>');

    $.get(`${API}/produtos`, function(lista) {
      if (!lista.length) {
        $("#tbody").html('<tr><td colspan="6" class="text-center py-4" style="color:var(--muted)">Nenhum produto cadastrado.</td></tr>');
        return;
      }
      let html = "";
      lista.forEach(p => {
        html += `<tr>
          <td style="color:var(--muted)">#${p.id}</td>
          <td><strong>${p.nome}</strong></td>
          <td style="color:var(--muted)">${p.descricao || '—'}</td>
          <td style="color:var(--accent); font-weight:600">${brl(p.preco)}</td>
          <td>${badgeDisp(p.disponivel)}</td>
          <td>
            <a href="editar-produto.html?id=${p.id}" class="btn btn-outline-secondary btn-sm me-1">Editar</a>
            <button class="btn btn-outline-danger btn-sm btn-excluir" data-id="${p.id}">Excluir</button>
          </td>
        </tr>`;
      });
      $("#tbody").html(html);
    }).fail(() => {
      $("#tbody").html('<tr><td colspan="6" class="text-center py-4 text-danger">Erro ao carregar.</td></tr>');
    });
  }

  $(document).on("click", ".btn-excluir", function() {
    delId = $(this).data("id");
    modal.show();
  });

  $("#btn-del").on("click", function() {
    $.ajax({
      url: `${API}/produtos/${delId}`,
      method: "DELETE",
      success() {
        modal.hide();
        toast("Produto excluído");
        carregar();
      },
      error() { toast("Erro ao excluir", "err"); }
    });
  });

  carregar();
</script>
</body>
</html>
