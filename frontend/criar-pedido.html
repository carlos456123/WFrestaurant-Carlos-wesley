<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Novo Pedido — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-title">🍽️ WF Restaurant</div>
  <a href="index.html" data-p="pedidos">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
    Pedidos
  </a>
  <a href="cardapio.html" data-p="cardapio">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
    Cardápio
  </a>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Novo Pedido</h1>
      <small>Preencha os dados abaixo</small>
    </div>
    <a href="index.html" class="btn btn-secondary btn-sm">← Voltar</a>
  </div>

  <div class="content">
    <div class="row g-4">

      <!-- Formulário -->
      <div class="col-md-7">
        <div class="card">
          <div class="card-body">
            <h6 class="mb-3" style="color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.06em;">Dados do Cliente</h6>

            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label">Nome *</label>
                <input id="nome_cliente" class="form-control" placeholder="Ex: João Silva"/>
              </div>
              <div class="col-6">
                <label class="form-label">Telefone *</label>
                <input id="telefone" class="form-control" placeholder="(11) 99999-9999"/>
              </div>
            </div>

            <hr style="border-color:var(--border); margin:16px 0"/>
            <h6 class="mb-3" style="color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.06em;">Produto</h6>

            <div class="mb-3">
              <label class="form-label">Selecione o produto *</label>
              <select id="produto_sel" class="form-select">
                <option value="">Carregando produtos...</option>
              </select>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-4">
                <label class="form-label">Quantidade *</label>
                <input id="quantidade" class="form-control" type="number" min="1" value="1"/>
              </div>
              <div class="col-8">
                <label class="form-label">Status</label>
                <select id="status" class="form-select">
                  <option>Preparando</option>
                  <option>Pronto</option>
                  <option>Entregue</option>
                  <option>Cancelado</option>
                </select>
              </div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-3">
              <a href="index.html" class="btn btn-secondary btn-sm">Cancelar</a>
              <button id="btn-salvar" class="btn btn-primary btn-sm" onclick="salvar()">Registrar Pedido</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Resumo -->
      <div class="col-md-5">
        <div class="card">
          <div class="card-body">
            <h6 class="mb-3" style="color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.06em;">Resumo</h6>

            <div class="d-flex justify-content-between mb-2">
              <span style="color:var(--muted)">Produto</span>
              <span id="r-produto">—</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span style="color:var(--muted)">Preço unitário</span>
              <span id="r-preco">—</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span style="color:var(--muted)">Quantidade</span>
              <span id="r-qtd">—</span>
            </div>
            <hr style="border-color:var(--border)"/>
            <div class="d-flex justify-content-between">
              <strong>Total</strong>
              <strong id="r-total" style="color:var(--accent); font-size:18px;">R$ 0,00</strong>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script>
  navAtivo("pedidos");
  let preco = 0;

  // Carrega produtos no select
  $.get(`${API}/produtos`, function(lista) {
    const sel = $("#produto_sel").empty().append('<option value="">Selecione...</option>');
    lista.filter(p => p.disponivel).forEach(p => {
      sel.append(`<option value="${p.nome}" data-preco="${p.preco}">${p.nome} — ${brl(p.preco)}</option>`);
    });
  }).fail(() => toast("Erro ao carregar cardápio", "err"));

  // Atualiza resumo ao trocar produto ou qtd
  $("#produto_sel").on("change", function() {
    const opt = $(this).find(":selected");
    preco = parseFloat(opt.data("preco")) || 0;
    $("#r-produto").text($(this).val() || "—");
    $("#r-preco").text(preco ? brl(preco) : "—");
    calcular();
  });

  $("#quantidade").on("input", calcular);

  function calcular() {
    const qtd = parseInt($("#quantidade").val()) || 0;
    $("#r-qtd").text(qtd || "—");
    $("#r-total").text(brl(preco * qtd));
  }

  function salvar() {
    const nome_cliente = $("#nome_cliente").val().trim();
    const telefone     = $("#telefone").val().trim();
    const produto      = $("#produto_sel").val();
    const quantidade   = parseInt($("#quantidade").val());
    const status       = $("#status").val();

    if (!nome_cliente || !telefone || !produto || !quantidade) {
      toast("Preencha todos os campos obrigatórios", "err");
      return;
    }

    const valor_total = preco * quantidade;
    $("#btn-salvar").prop("disabled", true).text("Salvando...");

    $.ajax({
      url: `${API}/pedidos`,
      method: "POST",
      contentType: "application/json",
      data: JSON.stringify({ nome_cliente, telefone, produto, quantidade, valor_total, status }),
      success() {
        toast("Pedido criado!");
        setTimeout(() => location.href = "index.html", 900);
      },
      error() {
        toast("Erro ao criar pedido", "err");
        $("#btn-salvar").prop("disabled", false).text("Registrar Pedido");
      }
    });
  }
</script>
</body>
</html>
