<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Pedido — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand">🍽️ WF Restaurant</span>
    <a href="../pedidos/index.html" class="btn btn-light btn-sm">← Pedidos</a>
  </div>
</nav>

<div class="container" style="max-width: 500px">
  <div class="card shadow-sm">
    <div class="card-body">

      <h3 class="mb-4">Editar Pedido <span id="titulo-id" class="text-muted fs-6"></span></h3>

      <div class="mb-3">
        <label class="form-label">Nome do Cliente</label>
        <input id="nome_cliente" class="form-control"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Telefone</label>
        <input id="telefone" class="form-control"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Produto</label>
        <input id="produto" class="form-control"/>
      </div>

      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="form-label">Quantidade</label>
          <input id="quantidade" class="form-control" type="number" min="1"/>
        </div>
        <div class="col-6">
          <label class="form-label">Valor Total (R$)</label>
          <input id="valor_total" class="form-control" type="number" step="0.01"/>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Status</label>
        <select id="status" class="form-select">
          <option>Preparando</option>
          <option>Pronto</option>
          <option>Entregue</option>
          <option>Cancelado</option>
        </select>
      </div>

      <button class="btn btn-vermelho w-100" id="btn-salvar" onclick="salvar()">
        Salvar Alterações
      </button>

    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="editar.js"></script>

</body>
</html>
