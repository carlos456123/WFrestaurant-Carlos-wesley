<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Prato</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand">🍽️ WF Restaurant</span>
    <a href="../index.html" class="btn btn-light btn-sm">Cardápio</a>
  </div>
</nav>

<div class="container" style="max-width: 500px">
  <div class="card shadow-sm">
    <div class="card-body">

      <h3 class="mb-4">Novo Prato</h3>

      <form id="form-criar">

        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input id="nome" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Descrição</label>
          <textarea id="descricao" class="form-control"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Preço</label>
          <input id="preco" type="number" step="0.01" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-vermelho w-100">Salvar</button>

      </form>

    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="criar.js"></script>

</body>
</html>
