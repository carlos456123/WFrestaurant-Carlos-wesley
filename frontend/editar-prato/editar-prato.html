<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Prato — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand">🍽️ WF Restaurant</span>
    <a href="../cardapio-admin/cardapio-admin.html" class="btn btn-light btn-sm">← Cardápio</a>
  </div>
</nav>

<div class="container" style="max-width:500px">
  <div class="card shadow-sm">
    <div class="card-body">

      <h3 class="mb-4">Editar Prato <span id="titulo-id" class="text-muted fs-6"></span></h3>

      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input id="nome" class="form-control"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Descrição</label>
        <textarea id="descricao" class="form-control"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Preço</label>
        <input id="preco" class="form-control" type="number" step="0.01"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Disponível</label>
        <select id="disponivel" class="form-select">
          <option value="true">Sim</option>
          <option value="false">Não</option>
        </select>
      </div>

      <button class="btn btn-vermelho w-100" id="btn-salvar" onclick="salvar()">
        Salvar Alterações
      </button>

    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="editar-prato.js"></script>
</body>
</html>
