<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f7f4;
      margin-left: 0 !important;  /* sem sidebar nessa página */
    }
    .login-card {
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo span {
      font-size: 36px;
    }
    .login-logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #8b0000;
      margin-top: 8px;
    }
    .login-logo p {
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <span>🍽️</span>
    <h1>WF Restaurant</h1>
    <p>Faça login para continuar</p>
  </div>

  <div class="card">
    <div class="card-body p-4">

      <!-- Mensagem de erro -->
      <div id="erro" class="alert alert-danger d-none" role="alert"></div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="email" type="email" class="form-control" placeholder="admin@wf.com"/>
      </div>

      <div class="mb-4">
        <label class="form-label">Senha</label>
        <input id="senha" type="password" class="form-control" placeholder="••••••••"/>
      </div>

      <button id="btn-login" class="btn btn-vermelho w-100" onclick="fazerLogin()">
        Entrar
      </button>

    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/utils.js"></script>
<script>
  // Se já estiver logado, redireciona direto
  if (localStorage.getItem("token")) {
    window.location.href = "index.html";
  }

  function fazerLogin() {
    const email = $("#email").val().trim();
    const senha  = $("#senha").val().trim();

    if (!email || !senha) {
      mostrarErro("Preencha email e senha.");
      return;
    }

    $("#btn-login").prop("disabled", true).text("Entrando...");

    $.ajax({
      url: `${API}/login`,
      method: "POST",
      contentType: "application/json",
      data: JSON.stringify({ email, senha }),
      success(res) {
        // Salva token e nome no localStorage
        localStorage.setItem("token", res.access_token);
        localStorage.setItem("usuario", res.nome);
        window.location.href = "index.html";
      },
      error(xhr) {
        const msg = xhr.responseJSON?.detail || "Email ou senha incorretos.";
        mostrarErro(msg);
        $("#btn-login").prop("disabled", false).text("Entrar");
      }
    });
  }

  function mostrarErro(msg) {
    $("#erro").removeClass("d-none").text(msg);
  }

  // Permite login com Enter
  $("#senha").on("keypress", function(e) {
    if (e.which === 13) fazerLogin();
  });
</script>
</body>
</html>
