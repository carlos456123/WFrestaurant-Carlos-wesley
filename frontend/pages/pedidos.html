<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Pedidos</h1>
      <small>Todos os pedidos registrados</small>
    </div>
  </div>

  <div class="content">
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Cliente</th>
              <th>Telefone</th>
              <th>Produto</th>
              <th>Qtd</th>
              <th>Total</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
   <div id="paginacao"></div>

 </div>
</div>

<!-- Modal delete -->
<div class="modal fade" id="modal-del" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Excluir pedido?</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-muted">Essa ação não pode ser desfeita.</div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger btn-sm" id="btn-del">Excluir</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/pedidos.js"></script>
<script>
  $("#sidebar-container").html(renderSidebar("../"));
  navAtivo("pedidos");
</script>
</body>
</html>
