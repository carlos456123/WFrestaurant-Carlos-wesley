<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand">🍽️ WF Restaurant</span>
    <div class="d-flex gap-2">
      <a href="../index.html"          class="btn btn-light btn-sm">Cardápio</a>
      <a href="cardapio-admin.html"    class="btn btn-dark btn-sm">Gerenciar Cardápio</a>
      <a href="criar-prato.html"       class="btn btn-warning btn-sm">+ Novo Prato</a>
    </div>
  </div>
</nav>

<div class="container">
  <h4 class="mb-3">📋 Gerenciar Pedidos</h4>

  <table class="table table-bordered table-hover bg-white">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Cliente</th>
        <th>Telefone</th>
        <th>Produto</th>
        <th>Qtd</th>
        <th>Total</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Modal delete -->
<div class="modal fade" id="modal-del" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Excluir pedido?</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-muted">Essa ação não pode ser desfeita.</div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger btn-sm" id="btn-del">Excluir</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/pedidos.js"></script>
</body>
</html>
