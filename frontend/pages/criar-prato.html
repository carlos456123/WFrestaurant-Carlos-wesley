<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Prato — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Novo Prato</h1>
      <small>Adicionar ao cardápio</small>
    </div>
    <a href="cardapio-admin.html" class="btn btn-outline-secondary btn-sm">← Voltar</a>
  </div>

  <div class="content">
    <div class="card" style="max-width:520px">
      <div class="card-body">
        <form id="form-criar">
          <div class="mb-3">
            <label class="form-label">Nome *</label>
            <input id="nome" type="text" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea id="descricao" class="form-control" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Preço *</label>
            <input id="preco" type="number" step="0.01" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-vermelho w-100">Salvar Prato</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/criar-prato.js"></script>
<script>
  $("#sidebar-container").html(renderSidebar("../"));
  navAtivo("criar-prato");
</script>
</body>
</html>
