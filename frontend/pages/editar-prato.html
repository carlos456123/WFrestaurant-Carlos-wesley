<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Prato — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Editar Prato <span id="titulo-id" style="color:#aaa; font-size:14px; font-weight:400"></span></h1>
      <small>Atualizar dados do prato</small>
    </div>
    <a href="cardapio-admin.html" class="btn btn-outline-secondary btn-sm">← Voltar</a>
  </div>

  <div class="content">
    <div class="card" style="max-width:520px">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Nome *</label>
          <input id="nome" class="form-control"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Descrição</label>
          <textarea id="descricao" class="form-control" rows="2"></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Preço *</label>
          <input id="preco" class="form-control" type="number" step="0.01"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Disponível</label>
          <select id="disponivel" class="form-select">
            <option value="true">Sim</option>
            <option value="false">Não</option>
          </select>
        </div>
        <button class="btn btn-vermelho w-100" id="btn-salvar" onclick="salvar()">
          Salvar Alterações
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/editar-prato.js"></script>
<script>
  $("#sidebar-container").html(renderSidebar("../"));
  navAtivo("cardapio-admin");
</script>
</body>
</html>
