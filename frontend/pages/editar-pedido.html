<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Pedido — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Editar Pedido <span id="titulo-id" style="color:#aaa; font-size:14px; font-weight:400"></span></h1>
      <small>Atualizar dados do pedido</small>
    </div>
    <a href="pedidos.html" class="btn btn-outline-secondary btn-sm">← Voltar</a>
  </div>

  <div class="content">
    <div class="card" style="max-width:520px">
      <div class="card-body">

        <div class="mb-3">
          <label class="form-label">Nome do Cliente *</label>
          <input id="nome_cliente" class="form-control"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Telefone *</label>
          <input id="telefone" class="form-control"/>
        </div>

        <!-- SELECT populado com produtos do backend (FK) -->
        <div class="mb-3">
          <label class="form-label">Produto *</label>
          <select id="produto_id" class="form-select">
            <option value="">Carregando produtos...</option>
          </select>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label">Quantidade *</label>
            <input id="quantidade" class="form-control" type="number" min="1"/>
          </div>
          <div class="col-6">
            <label class="form-label">Valor Total (R$) *</label>
            <input id="valor_total" class="form-control" type="number" step="0.01"/>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Status</label>
          <select id="status" class="form-select">
            <option>Preparando</option>
            <option>Pronto</option>
            <option>Entregue</option>
            <option>Cancelado</option>
          </select>
        </div>

        <button class="btn btn-vermelho w-100" id="btn-salvar" onclick="salvar()">
          Salvar Alterações
        </button>

      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/editar-pedido.js"></script>
<script>
  $("#sidebar-container").html(renderSidebar("../"));
  navAtivo("pedidos");
</script>
</body>
</html>
