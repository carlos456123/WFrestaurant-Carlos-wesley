<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Pedido — WF Restaurant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-title">🍽️ WF Restaurant</div>
  <a href="index.html" data-p="pedidos">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
    Pedidos
  </a>
  <a href="cardapio.html" data-p="cardapio">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
    Cardápio
  </a>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Editar Pedido <span id="topbar-id" style="color:var(--muted); font-size:14px; font-weight:400;"></span></h1>
      <small>Atualize os dados abaixo</small>
    </div>
    <a href="index.html" class="btn btn-secondary btn-sm">← Voltar</a>
  </div>

  <div class="content">
    <div class="row g-4">

      <div class="col-md-7">
        <div class="card">
          <div class="card-body">
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label">Nome do Cliente *</label>
                <input id="nome_cliente" class="form-control"/>
              </div>
              <div class="col-6">
                <label class="form-label">Telefone *</label>
                <input id="telefone" class="form-control"/>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Produto *</label>
              <input id="produto" class="form-control"/>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-4">
                <label class="form-label">Quantidade *</label>
                <input id="quantidade" class="form-control" type="number" min="1"/>
              </div>
              <div class="col-4">
                <label class="form-label">Valor Total (R$) *</label>
                <input id="valor_total" class="form-control" type="number" step="0.01"/>
              </div>
              <div class="col-4">
                <label class="form-label">Status</label>
                <select id="status" class="form-select">
                  <option>Preparando</option>
                  <option>Pronto</option>
                  <option>Entregue</option>
                  <option>Cancelado</option>
                </select>
              </div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-3">
              <a href="index.html" class="btn btn-secondary btn-sm">Cancelar</a>
              <button id="btn-salvar" class="btn btn-primary btn-sm" onclick="salvar()">Salvar Alterações</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Info lateral -->
      <div class="col-md-5">
        <div class="card">
          <div class="card-body">
            <h6 class="mb-3" style="color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.06em;">Informações</h6>
            <div class="d-flex justify-content-between mb-2">
              <span style="color:var(--muted)">ID</span>
              <strong id="info-id" style="color:var(--accent)">—</strong>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span style="color:var(--muted)">Status atual</span>
              <span id="info-status">—</span>
            </div>
            <hr style="border-color:var(--border)"/>
            <div class="d-flex justify-content-between">
              <span style="color:var(--muted)">Valor Total</span>
              <strong id="info-total" style="color:var(--accent); font-size:16px;">—</strong>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="utils.js"></script>
<script>
  navAtivo("pedidos");
  const id = new URLSearchParams(location.search).get("id");
  if (!id) location.href = "index.html";

  $("#topbar-id").text(`#${id}`);
  $("#info-id").text(`#${id}`);

  $.get(`${API}/pedidos/${id}`, function(p) {
    $("#nome_cliente").val(p.nome_cliente);
    $("#telefone").val(p.telefone);
    $("#produto").val(p.produto);
    $("#quantidade").val(p.quantidade);
    $("#valor_total").val(p.valor_total);
    $("#status").val(p.status);
    $("#info-status").html(badgePedido(p.status));
    $("#info-total").text(brl(p.valor_total));
  }).fail(() => {
    toast("Pedido não encontrado", "err");
    setTimeout(() => location.href = "index.html", 1200);
  });

  function salvar() {
    const dados = {
      nome_cliente: $("#nome_cliente").val().trim(),
      telefone:     $("#telefone").val().trim(),
      produto:      $("#produto").val().trim(),
      quantidade:   parseInt($("#quantidade").val()),
      valor_total:  parseFloat($("#valor_total").val()),
      status:       $("#status").val()
    };

    if (!dados.nome_cliente || !dados.telefone || !dados.produto || !dados.quantidade) {
      toast("Preencha todos os campos", "err");
      return;
    }

    $("#btn-salvar").prop("disabled", true).text("Salvando...");

    $.ajax({
      url: `${API}/pedidos/${id}`,
      method: "PUT",
      contentType: "application/json",
      data: JSON.stringify(dados),
      success() {
        toast("Pedido atualizado!");
        setTimeout(() => location.href = "index.html", 900);
      },
      error() {
        toast("Erro ao atualizar", "err");
        $("#btn-salvar").prop("disabled", false).text("Salvar Alterações");
      }
    });
  }
</script>
</body>
</html>
